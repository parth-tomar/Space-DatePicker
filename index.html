<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Datepicker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <!-- ── Space starfield background ── -->
  <canvas id="bg-canvas"></canvas>

  <!-- ── Unused solar canvas slot (reserved) ── -->
  <canvas id="solar-canvas"></canvas>

  <!-- ── Nebula colour overlays ── -->
  <div class="nebula-layer"></div>

  <!-- ── Tooltip ── -->
  <div class="tooltip" id="tooltip">
    <span class="tooltip-title" id="tt-title"></span>
    <span id="tt-body"></span>
  </div>

  <!-- ══════════════════════════════
       MAIN LAYOUT
  ══════════════════════════════ -->
  <div id="app">

    <!-- ── SUN ── -->
    <div class="planet-panel" id="sun-panel">
      <div class="planet-canvas-wrap" id="sun-wrap">
        <div class="planet-ring" style="--op:0.4; border-color:rgba(255,180,50,0.25)"></div>
        <div class="planet-ring" style="--op:0.2; border-color:rgba(255,140,30,0.15); animation-delay:.6s"></div>
        <div class="planet-ring" style="--op:0.1; border-color:rgba(255,100,20,0.1);  animation-delay:1.2s"></div>
        <canvas class="planet-3d" id="sun-canvas" width="180" height="180"></canvas>
      </div>
      <div class="planet-label">SOL · G-TYPE STAR</div>
      <div class="planet-stat">
        Surface: 5,778 K<br>
        Age: 4.6 Gyr · 1 AU
      </div>
    </div>

    <!-- ── DATEPICKER ── -->
    <div class="datepicker-glass">

      <div class="dp-chip">
        <span class="dp-chip-label">⬡ STARDATE NAVIGATOR ⬡</span>
      </div>

      <div class="nav-row">
        <button class="nav-btn" id="prev-btn">&#8249;</button>
        <div class="month-year-block">
          <span class="month-name-text" id="month-name"></span>
          <span class="year-text"       id="year-num"></span>
        </div>
        <button class="nav-btn" id="next-btn">&#8250;</button>
      </div>

      <div class="day-labels">
        <div class="day-lbl">SUN</div>
        <div class="day-lbl">MON</div>
        <div class="day-lbl">TUE</div>
        <div class="day-lbl">WED</div>
        <div class="day-lbl">THU</div>
        <div class="day-lbl">FRI</div>
        <div class="day-lbl">SAT</div>
      </div>

      <div class="days-grid" id="days-grid"></div>

      <div class="selected-row">
        <span class="sel-icon">🛸</span>
        <div class="sel-meta">
          <span class="sel-sublabel">Mission Date</span>
          <span class="sel-date-text" id="selected-date-label">Select a Stardate</span>
        </div>
      </div>

    </div><!-- /.datepicker-glass -->

    <!-- ── EARTH + MOON ── -->
    <div class="planet-panel" id="earth-panel">
      <div class="planet-canvas-wrap" id="earth-wrap">
        <div class="planet-ring" style="--op:0.4"></div>
        <div class="planet-ring" style="--op:0.2; animation-delay:.5s"></div>
        <div class="planet-ring" style="--op:0.1; animation-delay:1s"></div>
        <canvas class="planet-3d" id="earth-canvas" width="180" height="180"></canvas>
      </div>
      <div class="planet-label">TERRA · CLASS M</div>
      <div class="planet-stat">
        Orbital Period: 365.25 days<br>
        Tilt: 23.5° · 1 Moon
      </div>
    </div>

  </div><!-- /#app -->

  <!-- ── Scripts (order matters: Three.js loaded in <head>) ── -->
  <script src="main.js"></script>

</body>
</html>
